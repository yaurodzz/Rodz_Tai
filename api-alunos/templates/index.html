<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        /* CSS para fazer o link parecer um botão de verdade */
        .botao {
            background-color: #007BFF;
            color: white;
            padding: 12px 24px;
            text-decoration: none; /* Tira o sublinhado do link */
            border-radius: 5px;
            font-size: 16px;
            display: inline-block;
        }
        .botao:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Sistema de alunos</h1>

    <div class="container">
        <h2>Cadastrar Novo Aluno</h2>
        
        <form id="form-aluno" method="post" action="/alunos">
            <table>
                <tr>
                    <td>
                        <label for="nome">Nome do Aluno:</label>
                        <input type="text" id="nome" required>
                    </td>
                    <td>
                        <label for="idade">Idade:</label>
                        <input type="number" id="idade" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="nota1">Nota1:</label>
                        <input type="number" id="nota1" required>
                    </td>
                    <td>
                        <label for="nota2">Nota2:</label>
                        <input type="number" id="nota2" required>
                    </td>
                    <td>
                        <label for="nota3">Nota3:</label>
                        <input type="number" id="nota3" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button type="submit" class="btn-cadastrar">Cadastrar</button>
                    </td>
                </tr>
            </table>
        </form>

    </div>

    <h1>Listagem dos alunos</h1>
    <a href="http://127.0.0.1:5000/alunos" class="botao">Ver os alunos</a>
    <ul>
    {% for aluno in alunos %}
        <li>
            {{ aluno.nome }} - {{ aluno.idade }} anos
        </li>
    {% endfor %}
    </ul>
    
    <script>
        const formulario = document.getElementById('form-aluno');
        const divMensagem = document.getElementById('mensagem');

        formulario.addEventListener('submit', function(evento) {
            
            evento.preventDefault();

            const nomeDigitado = document.getElementById('nome').value;
            const idadeDigitada = document.getElementById('idade').value;
            const nota1Digitada = document.getElementById('nota1').value;
            const nota2Digitada = document.getElementById('nota2').value;
            const nota3Digitada = document.getElementById('nota3').value;

            const dadosDoAluno = {
                "nome": nomeDigitado,
                "idade": parseInt(idadeDigitada),
                "nota1": parseInt(nota1Digitada),
                "nota2": parseInt(nota2Digitada),
                "nota3": parseInt(nota3Digitada)
            };

            fetch('/alunos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dadosDoAluno)
            })
        });
    </script>

</body>
</html>
