<!DOCTYPE html>
<html>
    <head>
        <title>Cadastro de Alunos</title>
    </head>

    <body>
        <h1>Cadastro de Alunos</h1>
        <form method="POST" action="/alunos">
            Nome:
            <input type="text" name="nome" required>
            Idade:
            <input type="number" name="idade" required>
            Nota 1:
            <input type="number" step="0.1" name="nota1" required>
            Nota 2:
            <input type="number" step="0.1" name="nota2" required>
            Nota 3:
            <input type="number" step="0.1" name="nota3" required>
            <button type="submit">Cadastrar</button>
        </form>

        <hr>
        <h1>Atualizar Aluno</h1>

        <form method="POST" action="/alunos">
            Nome:
            <input type="text" name="nome" required>
            Idade:
            <input type="number" name="idade" required>
            Nota 1:
            <input type="number" step="0.1" name="nota1" required>
            Nota 2:
            <input type="number" step="0.1" name="nota2" required>
            Nota 3:
            <input type="number" step="0.1" name="nota3" required>
            <button type="submit">Cadastrar</button>
        </form>

        <hr>

        <h2>Lista de Alunos</h2>
        
        <ul>
        {% for aluno in alunos %}
            <li>
                {{ aluno.nome }} - {{ aluno.idade }} anos - Média: {{ "%.2f"|format(aluno.calcular_media())}}
            </li>
        {% endfor %}
        </ul>

    </body>
</html>
