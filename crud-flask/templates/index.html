<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>
</head>
<body>

    <h1>Sistema de alunos</h1>

    <div class="container">
        <h2>Cadastrar Novo Aluno</h2>
        
        <form id="form-aluno" method="post" action="/alunos">
            <table>
                <tr>
                    <td>
                        <label for="nome">Nome do Aluno:</label>
                        <input type="text" id="nome" required>
                    </td>
                    <td>
                        <label for="idade">Idade:</label>
                        <input type="number" id="idade" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button type="submit" class="btn-cadastrar">Cadastrar</button>
                    </td>
                </tr>
            </table>
        </form>

    </div>

    <h1>Listagem dos alunos</h1>
    <h2>Lista de Alunos</h2>
    <ul>
        {% for aluno in alunos %}
        <li>
            {{ aluno.nome }} - {{ aluno.idade }} anos
            [<a href="/editar/{{ aluno.id }}">Editar</a>]
            [<a href="/remover/{{ aluno.id }}"
                onclick="return confirm('Tem certeza que deseja remover este aluno?')">Remover</a>]
        </li>
        {% endfor %}
    </ul>

</body>
</html>
